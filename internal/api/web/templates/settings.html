{{define "page"}}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2">Settings</h1>
</div>
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Change Password</h5>
        <div id="settingsError" class="alert alert-danger d-none"></div>
        <form id="passwordForm">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword" required minlength="8">
          </div>
          <button type="submit" class="btn btn-primary" id="changePasswordBtn">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
{{define "scripts"}}
<script>
document.getElementById('passwordForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errEl = document.getElementById('settingsError');
  errEl.classList.add('d-none');
  const current = document.getElementById('currentPassword').value;
  const newPass = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  if (newPass !== confirm) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.remove('d-none');
    return;
  }
  document.getElementById('changePasswordBtn').disabled = true;
  const data = await apiFetch('/api/auth/password', {
    method: 'PUT',
    body: JSON.stringify({current_password: current, new_password: newPass})
  });
  document.getElementById('changePasswordBtn').disabled = false;
  if (!data || data.error) {
    errEl.textContent = data ? data.error : 'Failed to update password';
    errEl.classList.remove('d-none');
    showToast(data ? data.error : 'Failed to update password', 'error');
    return;
  }
  document.getElementById('currentPassword').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  showToast('Password updated successfully', 'success');
});
requireAuth();
</script>
{{end}}
