{{define "page"}}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <h2 class="mb-3">Register</h2>
    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <div id="successMsg" class="alert alert-success d-none"></div>
    <form id="registerForm">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">Create account</button>
    </form>
    <p class="mt-3 text-muted small">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
{{end}}
{{define "scripts"}}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const okEl = document.getElementById('successMsg');
  errEl.classList.add('d-none');
  okEl.classList.add('d-none');
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, password})
    });
    if (!res.ok) {
      const data = await res.json();
      errEl.textContent = data.error || 'Registration failed';
      errEl.classList.remove('d-none');
      return;
    }
    okEl.textContent = 'Account created! Redirecting to login...';
    okEl.classList.remove('d-none');
    setTimeout(() => window.location.href = '/login', 1500);
  } catch {
    errEl.textContent = 'Connection error';
    errEl.classList.remove('d-none');
  }
});
</script>
{{end}}
