{{define "page"}}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2">Certificates</h1>
  <div>
    <button class="btn btn-outline-warning" onclick="purgeAllErrors()">Purge All Errors</button>
  </div>
</div>
<div class="row mb-3 g-2">
  <div class="col-md-3">
    <input type="text" class="form-control" id="certSearch" placeholder="Search subject/issuer..." oninput="loadCertificates()">
  </div>
  <div class="col-md-2">
    <select class="form-select" id="certStatus" onchange="loadCertificates()">
      <option value="">All statuses</option>
      <option value="valid">Valid</option>
      <option value="expired">Expired</option>
      <option value="error">Error</option>
      <option value="expiring">Expiring</option>
    </select>
  </div>
  <div class="col-md-2">
    <select class="form-select" id="certProtocol" onchange="loadCertificates()">
      <option value="">All protocols</option>
      <option value="https">HTTPS</option>
      <option value="ct">CT Log</option>
      <option value="unknown">Unknown</option>
    </select>
  </div>
  <div class="col-md-2">
    <select class="form-select" id="certExpiring" onchange="loadCertificates()">
      <option value="">Expiring...</option>
      <option value="7">Within 7 days</option>
      <option value="14">Within 14 days</option>
      <option value="30">Within 30 days</option>
      <option value="90">Within 90 days</option>
    </select>
  </div>
  <div class="col-md-1">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="certExpired" onchange="loadCertificates()">
      <label class="form-check-label" for="certExpired">Expired</label>
    </div>
  </div>
</div>
<div class="table-responsive">
  <table class="table table-striped" id="certsTable">
    <thead><tr><th>Domain</th><th>Subject</th><th>Issuer</th><th>Expires</th><th>Days</th><th>Status</th></tr></thead>
    <tbody id="certsBody">
    <tr class="skeleton-row"><td><span class="skeleton" style="width:50%">&nbsp;</span></td><td><span class="skeleton" style="width:45%">&nbsp;</span></td><td><span class="skeleton" style="width:40%">&nbsp;</span></td><td><span class="skeleton" style="width:35%">&nbsp;</span></td><td><span class="skeleton" style="width:20%">&nbsp;</span></td><td><span class="skeleton" style="width:25%">&nbsp;</span></td></tr>
    <tr class="skeleton-row"><td><span class="skeleton" style="width:45%">&nbsp;</span></td><td><span class="skeleton" style="width:40%">&nbsp;</span></td><td><span class="skeleton" style="width:45%">&nbsp;</span></td><td><span class="skeleton" style="width:35%">&nbsp;</span></td><td><span class="skeleton" style="width:20%">&nbsp;</span></td><td><span class="skeleton" style="width:25%">&nbsp;</span></td></tr>
    <tr class="skeleton-row"><td><span class="skeleton" style="width:55%">&nbsp;</span></td><td><span class="skeleton" style="width:50%">&nbsp;</span></td><td><span class="skeleton" style="width:40%">&nbsp;</span></td><td><span class="skeleton" style="width:35%">&nbsp;</span></td><td><span class="skeleton" style="width:20%">&nbsp;</span></td><td><span class="skeleton" style="width:25%">&nbsp;</span></td></tr>
  </tbody>
  </table>
  <nav class="d-none" id="certPagination">
    <ul class="pagination pagination-sm justify-content-center mt-3">
      <li class="page-item" id="certPrev"><button class="page-link" onclick="loadCertsPage(currentCertPage - 1)">Previous</button></li>
      <li class="page-item disabled"><span class="page-link" id="certPageInfo">Page 1</span></li>
      <li class="page-item" id="certNext"><button class="page-link" onclick="loadCertsPage(currentCertPage + 1)">Next</button></li>
    </ul>
  </nav>
</div>
<div id="emptyCerts" class="empty-state d-none">
  <h4>No certificates found</h4>
  <p>No certificates match your current filters.</p>
</div>
{{end}}
{{define "scripts"}}
<script>
var currentCertPage = 1;
var certPageLimit = 25;
var loadCertsId = 0;
function loadCertificates() { loadCertsPage(1); }
async function loadCertsPage(page) {
  currentCertPage = page;
  const id = ++loadCertsId;
  const q = document.getElementById('certSearch').value;
  const status = document.getElementById('certStatus').value;
  const protocol = document.getElementById('certProtocol').value;
  const expiring = document.getElementById('certExpiring').value;
  const expired = document.getElementById('certExpired').checked;

  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (status) {
    if (status === 'expiring') {
      params.set('expiring', '30');
    } else {
      params.set('status', status);
    }
  }
  if (protocol) params.set('protocol', protocol);
  if (expiring) params.set('expiring', expiring);
  if (expired) params.set('expired', 'true');
  params.set('page', page);
  params.set('limit', certPageLimit);

  const certQuery = '/api/certificates?' + params.toString();
  const [certsData, domainsData] = await Promise.all([
    apiFetch(certQuery),
    apiFetch('/api/domains?limit=0')
  ]);
  if (!certsData || !domainsData || id !== loadCertsId) return;
  const domainMap = {};
  (domainsData.domains || []).forEach(d => domainMap[d.id] = d.domain);
  const tbody = document.getElementById('certsBody');
  if (id !== loadCertsId) return;
  document.querySelectorAll('#certsBody .skeleton-row').forEach(function(r) { r.remove(); });
  document.getElementById('emptyCerts').classList.add('d-none');
  var pag = document.getElementById('certPagination');
  if (pag) pag.classList.add('d-none');
  const certsList = certsData.certificates || [];
  if (certsList.length === 0 && page === 1) {
    document.getElementById('emptyCerts').classList.remove('d-none');
    return;
  }
  tbody.innerHTML = '';
  certsList.sort((a, b) => daysUntil(a.not_after) - daysUntil(b.not_after)).forEach(c => {
    const days = daysUntil(c.not_after);
    tbody.innerHTML += `<tr>
      <td><a href="/domains/${c.domain_id}">${escapeHtml(domainMap[c.domain_id] || '?')}</a></td>
      <td>${escapeHtml(c.subject)}</td>
      <td>${escapeHtml(c.issuer)}</td>
      <td>${new Date(c.not_after).toLocaleDateString()}</td>
      <td class="${statusClass(c.status)}">${days}</td>
      <td><span class="${statusClass(c.status)}">${c.status}</span></td>
    </tr>`;
  });
  makeSortable('certsTable');
  if (pag && certsData.total > certPageLimit) {
    pag.classList.remove('d-none');
    document.getElementById('certPageInfo').textContent = 'Page ' + page + ' of ' + Math.ceil(certsData.total / certPageLimit);
    document.getElementById('certPrev').classList.toggle('disabled', page <= 1);
    document.getElementById('certNext').classList.toggle('disabled', page * certPageLimit >= certsData.total);
  }
}
async function purgeAllErrors() {
  const ok = await showConfirm('Purge All Errors', 'Delete all error certificates across all domains?');
  if (!ok) return;
  const data = await apiFetch('/api/certificates/errors', {method: 'DELETE'});
  if (data) {
    showToast('Deleted ' + data.deleted + ' error certificate(s)', 'success');
    loadCertificates();
  }
}
requireAuth();
loadCertificates();
</script>
{{end}}
