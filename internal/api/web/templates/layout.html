<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CertWatch{{if .Title}} - {{.Title}}{{end}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <button class="navbar-toggler d-lg-none position-absolute" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="/dashboard">CertWatch</a>
    <input type="search" class="form-control form-control-dark me-auto w-50" id="globalSearch" placeholder="Search domains..." maxlength="200">
    <div class="navbar-nav align-items-center gap-2 px-3">
      <a class="nav-link" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</a>
      <a class="nav-link position-relative" id="notifBell" href="/certificates?status=expiring" title="Expiring certificates">
        🔔<span id="notifBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
      </a>
      <div class="dropdown">
        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
          <span class="avatar-circle" id="userAvatar">U</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><span class="dropdown-item-text small text-muted" id="userEmailDD">user@example.com</span></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="/settings">Settings</a></li>
          <li><a class="dropdown-item" href="#" onclick="logout()">Sign out</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row flex-lg-nowrap">
      <nav id="sidebarMenu" class="offcanvas offcanvas-start offcanvas-lg bg-light sidebar" tabindex="-1" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header d-lg-none">
          <h5 class="offcanvas-title" id="sidebarLabel">CertWatch</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0 pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link{{if eq .Active "dashboard"}} active{{end}}" href="/dashboard" onclick="closeOffcanvas()">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "domains"}} active{{end}}" href="/domains" onclick="closeOffcanvas()">Domains</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "certificates"}} active{{end}}" href="/certificates" onclick="closeOffcanvas()">Certificates</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "import"}} active{{end}}" href="/import" onclick="closeOffcanvas()">Import</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "reports"}} active{{end}}" href="/reports" onclick="closeOffcanvas()">Reports</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "settings"}} active{{end}}" href="/settings" onclick="closeOffcanvas()">Settings</a></li>
          </ul>
        </div>
      </nav>
      <main class="col px-md-4 min-width-0">
        {{template "page" .}}
      </main>
    </div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmTitle">Confirm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="confirmBody">Are you sure?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
