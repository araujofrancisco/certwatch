<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CertWatch{{if .Title}} - {{.Title}}{{end}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="/dashboard">CertWatch</a>
    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="w-100"></div>
    <div class="navbar-nav px-3">
      <a class="nav-link" href="#" onclick="logout()">Sign out</a>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link{{if eq .Active "dashboard"}} active{{end}}" href="/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "domains"}} active{{end}}" href="/domains">Domains</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "certificates"}} active{{end}}" href="/certificates">Certificates</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "import"}} active{{end}}" href="/import">Import</a></li>
            <li class="nav-item"><a class="nav-link{{if eq .Active "reports"}} active{{end}}" href="/reports">Reports</a></li>
          </ul>
        </div>
      </nav>
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        {{template "page" .}}
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
