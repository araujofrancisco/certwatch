<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CertWatch{{if .Title}} - {{.Title}}{{end}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/static/css/dashboard.css?v=4" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm app-navbar">
    <div class="container-fluid px-3 d-flex align-items-center gap-2">
      <a class="navbar-brand py-0 flex-shrink-0" href="/dashboard">CertWatch</a>
      <input type="search" class="form-control form-control-dark search-input flex-grow-1 flex-md-grow-0 mx-md-auto" id="globalSearch" placeholder="Search domains..." maxlength="200">
      <div class="d-flex align-items-center gap-1 flex-shrink-0">
        <button class="nav-link d-flex align-items-center justify-content-center p-1" id="themeToggle" onclick="toggleTheme()" type="button" title="Toggle dark mode" style="width:32px;height:32px;">
          <i class="bi bi-moon fs-6"></i>
        </button>
        <a class="nav-link position-relative d-flex align-items-center justify-content-center p-1" id="notifBell" href="/certificates?status=expiring" title="Expiring certificates" style="width:32px;height:32px;">
          <i class="bi bi-bell fs-6"></i>
          <span id="notifBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: .55rem;">0</span>
        </a>
        <div class="dropdown">
          <button class="nav-link dropdown-toggle d-flex align-items-center p-0 border-0 bg-transparent" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="userDropdown">
            <span class="avatar-circle" id="userAvatar">U</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="userDropdown">
            <li><span class="dropdown-item-text small text-secondary px-3 py-2" id="userEmailDD">user@example.com</span></li>
            <li><hr class="dropdown-divider my-1"></li>
            <li><a class="dropdown-item py-2" href="/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><a class="dropdown-item py-2" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Sign out</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid pt-5">
    <div class="row">
      <div class="col-12 col-md-auto bg-light sidebar pt-3 pb-2 pb-md-0">
        <ul class="nav flex-md-column justify-content-center justify-content-md-start">
          <li class="nav-item"><a class="nav-link{{if eq .Active "dashboard"}} active{{end}}" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link{{if eq .Active "domains"}} active{{end}}" href="/domains">Domains</a></li>
          <li class="nav-item"><a class="nav-link{{if eq .Active "certificates"}} active{{end}}" href="/certificates">Certificates</a></li>
          <li class="nav-item"><a class="nav-link{{if eq .Active "import"}} active{{end}}" href="/import">Import</a></li>
          <li class="nav-item"><a class="nav-link{{if eq .Active "reports"}} active{{end}}" href="/reports">Reports</a></li>
        </ul>
      </div>
      <main class="col px-md-4 pt-3 pt-md-0">
        {{template "page" .}}
      </main>
    </div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmTitle">Confirm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="confirmBody">Are you sure?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/dashboard.js?v=4"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
