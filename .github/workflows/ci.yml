name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: Test
        run: go test ./... -v -count=1

      - name: Build
        run: go build -ldflags="-s -w" -o /dev/null ./cmd/certwatch/

      - name: Check tidy
        run: go mod tidy -e && git diff --exit-code go.mod go.sum
